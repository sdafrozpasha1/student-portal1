<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register - Student Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="loader"><div class="ld-logo">Student<span>Portal</span></div><div class="ld-spin"></div></div>
<div id="toasts"></div>
<div class="auth-wrap" style="padding:3rem 1rem;">
<div class="form-card" style="max-width:600px;">
  <div class="text-center mb-4">
    <a href="index.html" style="font-size:1.5rem;font-weight:800;color:#0D47A1;text-decoration:none;">Student<span style="color:#FFC107">Portal</span></a>
    <h2 class="mt-3 mb-1">Create Account</h2>
    <p class="text-muted small">Join thousands of students learning today</p>
  </div>
  <form id="registerForm" novalidate>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regName">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="regName" class="form-control" placeholder="Your full name"/>
        </div>
        <div id="regNameErr" class="fm e"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regId">Student ID</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-card-text"></i></span>
          <input type="text" id="regId" class="form-control" placeholder="e.g. STU2024001"/>
        </div>
        <div id="regIdErr" class="fm e"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regEmail">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="regEmail" class="form-control" placeholder="you@email.com"/>
        </div>
        <div id="regEmailErr" class="fm e"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regMobile">Mobile Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-phone"></i></span>
          <input type="tel" id="regMobile" class="form-control" placeholder="e.g. 05012345678"/>
        </div>
        <div id="regMobileErr" class="fm e"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regDob">Date of Birth</label>
        <input type="date" id="regDob" class="form-control"/>
        <div id="regDobErr" class="fm e"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regGender">Gender</label>
        <select id="regGender" class="form-select">
          <option value="">Select gender</option>
          <option>Male</option><option>Female</option><option>Prefer not to say</option>
        </select>
        <div id="regGenderErr" class="fm e"></div>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold" for="regCourse">Course Selection</label>
        <select id="regCourse" class="form-select">
          <option value="">Select your course</option>
          <option>Computer Science</option><option>Business Administration</option>
          <option>Engineering</option><option>Medicine</option>
          <option>Arts & Design</option><option>Law</option><option>Education</option>
        </select>
        <div id="regCourseErr" class="fm e"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regPw">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="regPw" class="form-control" placeholder="Min 8 characters"/>
          <button type="button" class="pass-eye" data-target="regPw" aria-label="Toggle password"><i class="bi bi-eye"></i></button>
        </div>
        <div class="str-bar"><div class="str-fill" id="strFill"></div></div>
        <div class="fm" id="strLabel"></div>
        <div id="regPwErr" class="fm e"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold" for="regCpw">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="regCpw" class="form-control" placeholder="Repeat password"/>
          <button type="button" class="pass-eye" data-target="regCpw" aria-label="Toggle confirm password"><i class="bi bi-eye"></i></button>
        </div>
        <div id="regCpwErr" class="fm e"></div>
      </div>
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="regTerms"/>
          <label class="form-check-label small" for="regTerms">I agree to the <a href="#" class="text-primary">Terms & Conditions</a> and <a href="#" class="text-primary">Privacy Policy</a></label>
        </div>
        <div id="regTermsErr" class="fm e"></div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn-submit">Create Account</button>
      </div>
    </div>
  </form>
  <p class="text-center small mt-3">Already have an account? <a href="login.html" class="text-primary fw-semibold">Login here</a></p>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
