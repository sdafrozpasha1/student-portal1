<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login - Student Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<div id="loader"><div class="ld-logo">Student<span>Portal</span></div><div class="ld-spin"></div></div>
<div id="toasts"></div>
<div class="auth-wrap">
  <div class="form-card">
    <div class="text-center mb-4">
      <a href="index.html" class="navbar-brand" style="font-size:1.6rem;font-weight:800;color:#0D47A1;">Student<span style="color:#FFC107">Portal</span></a>
      <h2 class="mt-3 mb-1">Welcome Back</h2>
      <p class="text-muted small">Login to your student account</p>
    </div>
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="loginId" class="form-label fw-600">Student ID or Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="loginId" class="form-control" placeholder="Enter your ID or email" autocomplete="username"/>
        </div>
        <div id="loginIdErr" class="fm e"></div>
      </div>
      <div class="mb-3">
        <div class="d-flex justify-content-between">
          <label for="loginPw" class="form-label fw-600">Password</label>
          <a href="#" class="text-primary small">Forgot Password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="loginPw" class="form-control" placeholder="Enter your password" autocomplete="current-password"/>
          <button type="button" class="pass-eye" data-target="loginPw" aria-label="Show password"><i class="bi bi-eye"></i></button>
        </div>
        <div id="loginPwErr" class="fm e"></div>
      </div>
      <div class="mb-4 d-flex justify-content-between align-items-center">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe"/>
          <label class="form-check-label small" for="rememberMe">Remember me</label>
        </div>
      </div>
      <button type="submit" class="btn-submit mb-3">Login</button>
      <div class="divider"><span>or continue with</span></div>
      <button type="button" class="btn-google mb-3">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.1 13.1 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 7.1-10 7.1-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.9-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.7 2.2-7.7 2.2-6.4 0-11.8-3.6-13.6-9.2l-7.8 6C6.6 42.6 14.6 48 24 48z"/></svg>
        Continue with Google
      </button>
    </form>
    <p class="text-center small mt-2">Do not have an account? <a href="register.html" class="text-primary fw-600">Register here</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
